# Alternativa para teste grátis no Render.
# Atenção: nesta configuração os dados salvos em JSON podem sumir em restart/redeploy.
services:
  - type: web
    name: legend-of-indle-rpg-v1-free
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
